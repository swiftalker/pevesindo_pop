{% extends 'base.html' %}
{% block title %}{{ 'Edit' if action == 'edit' else 'Tambah' }} Produk{% endblock %}

{% block content %}
<div class="d-flex align-items-center mt-4 mb-4 gap-3">
    <a href="{{ url_for('produk_list') }}" class="btn btn-outline-secondary btn-sm">
        <i class="bi bi-arrow-left"></i>
    </a>
    <h4 class="mb-0 fw-semibold">
        <i class="bi bi-box-seam me-2 text-primary"></i>
        {{ 'Edit Produk' if action == 'edit' else 'Tambah Produk' }}
    </h4>
</div>

<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body">
                <form method="post">
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Kode Produk <span class="text-danger">*</span></label>
                        <input type="text" name="kode" class="form-control"
                               value="{{ data.kode if data else '' }}" required maxlength="50">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nama Produk <span class="text-danger">*</span></label>
                        <input type="text" name="nama" class="form-control"
                               value="{{ data.nama if data else '' }}" required maxlength="200">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Satuan <span class="text-danger">*</span></label>
                        <input type="text" name="satuan" class="form-control"
                               value="{{ data.satuan if data else '' }}" required maxlength="50"
                               placeholder="pcs, kg, liter, box, …">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Harga Jual (Rp)</label>
                        <input type="number" name="harga_jual" class="form-control"
                               value="{{ data.harga_jual if data else 0 }}" min="0" step="0.01">
                    </div>
                    <div class="mb-3">
                        <label class="form-label fw-semibold">Stok</label>
                        <input type="number" name="stok" class="form-control"
                               value="{{ data.stok if data else 0 }}" min="0">
                    </div>
                    <div class="mb-4">
                        <label class="form-label fw-semibold">Keterangan</label>
                        <textarea name="keterangan" class="form-control" rows="3">{{ data.keterangan if data else '' }}</textarea>
                    </div>
                    <div class="d-flex gap-2">
                        <button type="submit" class="btn btn-primary">
                            <i class="bi bi-save me-1"></i>Simpan
                        </button>
                        <a href="{{ url_for('produk_list') }}" class="btn btn-outline-secondary">Batal</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
